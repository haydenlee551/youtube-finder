<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Outlier Finder</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset-min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: #F6F6F7;
  color: #1E1E1F;
  min-height: 100vh;
}

/* Header */
.header {
  background: #FFFFFF;
  border-bottom: 1px solid #E9E9EB;
  padding: 20px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0px 4px 12px rgba(0,0,0,0.05);
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: #1E1E1F;
}

.logo-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  background: #0C893B;
  border-radius: 8px;
  color: #fff;
  font-size: 14px;
}

/* API Key */
.api-key-section { margin-bottom: 14px; }

.api-key-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.api-key-row input {
  flex: 1;
  min-width: 200px;
  max-width: 320px;
  padding: 8px 14px;
  background: #F6F6F7;
  border: 1px solid #E3E3E6;
  border-radius: 8px;
  color: #1E1E1F;
  font-size: 13px;
  font-family: inherit;
  transition: border-color 0.15s;
}

.api-key-row input:focus { outline: none; border-color: #0C893B; }

.api-key-row input.key-name {
  max-width: 140px;
  min-width: 100px;
}

.api-key-row button {
  padding: 8px 16px;
  background: #F6F6F7;
  border: 1px solid #E3E3E6;
  border-radius: 8px;
  color: #4A4A4D;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  font-weight: 500;
  transition: all 0.15s;
}

.api-key-row button:hover { background: #EDEEF0; border-color: #D7D7D9; }
.api-key-status { font-size: 12px; color: #0C893B; margin-left: 8px; line-height: 36px; font-weight: 500; }

.key-list {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.key-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: #F6F6F7;
  border: 1px solid #E3E3E6;
  border-radius: 200px;
  font-size: 13px;
  color: #58595C;
  cursor: pointer;
  transition: all 0.15s;
}

.key-chip:hover { border-color: #D7D7D9; background: #EDEEF0; }

.key-chip.active {
  border-color: #0C893B;
  color: #197B2E;
  background: #E9F5EA;
}

.key-chip .chip-name { font-weight: 600; }
.key-chip .chip-key { color: #9E9EA0; font-size: 11px; }

.key-chip .chip-delete {
  color: #9E9EA0;
  font-size: 15px;
  line-height: 1;
  padding: 0 2px;
}

.key-chip .chip-delete:hover { color: #FF4D4D; }

/* Search */
.search-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.search-row input {
  flex: 1;
  padding: 12px 18px;
  background: #F6F6F7;
  border: 1px solid #E3E3E6;
  border-radius: 12px;
  color: #1E1E1F;
  font-size: 15px;
  font-family: inherit;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.search-row input:focus {
  outline: none;
  border-color: #0C893B;
  box-shadow: 0 0 0 3px rgba(12,137,59,0.1);
}

.btn-search {
  padding: 12px 28px;
  background: #0C893B;
  border: none;
  border-radius: 12px;
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}

.btn-search:hover { background: #006E23; }
.btn-search:disabled { background: #D7D7D9; color: #9E9EA0; cursor: not-allowed; }

/* Filters */
.filters {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.filters label {
  font-size: 13px;
  color: #58595C;
  font-weight: 500;
}

.filters select {
  padding: 7px 12px;
  background: #FFFFFF;
  border: 1px solid #E3E3E6;
  border-radius: 8px;
  color: #1E1E1F;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: border-color 0.15s;
}

.filters select:focus { outline: none; border-color: #0C893B; }
.filters select { min-width: 100px; }

/* Sort bar */
.sort-bar {
  max-width: 1200px;
  margin: 20px auto 0;
  padding: 0 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.result-count { font-size: 14px; color: #58595C; font-weight: 500; }

.sort-btns { display: flex; gap: 6px; }

.sort-btns button {
  padding: 7px 16px;
  background: #FFFFFF;
  border: 1px solid #E3E3E6;
  border-radius: 200px;
  color: #58595C;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  font-weight: 500;
  transition: all 0.15s;
}

.sort-btns button:hover { background: #F6F6F7; }

.sort-btns button.active {
  background: #0C893B;
  border-color: #0C893B;
  color: #fff;
}

/* Results */
.results {
  max-width: 1200px;
  margin: 16px auto;
  padding: 0 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

/* Card */
.card {
  background: #FFFFFF;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #E9E9EB;
  transition: transform 0.15s, box-shadow 0.15s;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0px 6px 16px rgba(0,0,0,0.08), 0px 2px 8px rgba(0,0,0,0.04);
}

.card-thumb {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  overflow: hidden;
  cursor: pointer;
}

.card-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.outlier-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  padding: 4px 10px;
  border-radius: 200px;
  font-weight: 700;
  font-size: 13px;
  color: #fff;
  backdrop-filter: blur(4px);
}

.outlier-badge.hot { background: rgba(12,137,59,0.9); }
.outlier-badge.warm { background: rgba(255,159,67,0.9); }
.outlier-badge.normal { background: rgba(88,89,92,0.75); }

.card-body { padding: 16px; }

.card-title {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.5;
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-title a {
  color: #1E1E1F;
  text-decoration: none;
}

.card-title a:hover { color: #0C893B; }

.card-channel {
  font-size: 13px;
  color: #58595C;
  margin-bottom: 12px;
}

.card-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.stat {
  background: #F6F6F7;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
}

.stat-label {
  font-size: 11px;
  color: #9E9EA0;
  margin-bottom: 3px;
  font-weight: 500;
}

.stat-value {
  font-size: 14px;
  font-weight: 700;
  color: #1E1E1F;
}

.stat-value.highlight { color: #0C893B; }

/* Loading */
.loading {
  text-align: center;
  padding: 60px 20px;
  color: #58595C;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid #E3E3E6;
  border-top-color: #0C893B;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Empty */
.empty {
  text-align: center;
  padding: 80px 20px;
  color: #9E9EA0;
  font-size: 15px;
  grid-column: 1 / -1;
}

/* Progress */
.progress-bar {
  max-width: 1200px;
  margin: 16px auto 0;
  padding: 0 24px;
  display: none;
}

.progress-bar.show { display: block; }

.progress-track {
  height: 4px;
  background: #E3E3E6;
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: #0C893B;
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s;
}

.progress-text {
  font-size: 12px;
  color: #58595C;
  margin-top: 8px;
  text-align: center;
  font-weight: 500;
}

/* Error */
.error-msg {
  max-width: 1200px;
  margin: 16px auto;
  padding: 12px 20px;
  background: #FFF0F0;
  border: 1px solid #FFD4D4;
  border-radius: 10px;
  color: #D32F2F;
  font-size: 14px;
  display: none;
}

.error-msg.show { display: block; }

/* Responsive */
@media (max-width: 600px) {
  .results { grid-template-columns: 1fr; }
  .filters { flex-direction: column; gap: 8px; align-items: flex-start; }
  .search-row input { font-size: 14px; padding: 10px 14px; }
  .btn-search { padding: 10px 20px; font-size: 14px; }
  .header-inner { padding: 0 16px; }
  .results { padding: 0 16px; }
  .sort-bar { padding: 0 16px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">&#9654;</div>
      YouTube Outlier Finder
    </div>

    <div class="api-key-section">
      <div class="key-list" id="keyList"></div>
      <div class="api-key-row">
        <input type="text" class="key-name" id="keyName" placeholder="이름 (예: 개인)">
        <input type="password" id="apiKey" placeholder="YouTube Data API v3 Key 입력">
        <button onclick="addApiKey()">추가</button>
        <span class="api-key-status" id="keyStatus"></span>
      </div>
    </div>

    <div class="search-row">
      <input type="text" id="query" placeholder="검색할 주제를 입력하세요 (예: 캠핑 브이로그)" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn-search" id="btnSearch" onclick="doSearch()">검색</button>
    </div>

    <div class="filters">
      <label>영상 길이</label>
      <select id="duration">
        <option value="">전체</option>
        <option value="short">숏폼 (4분 이하)</option>
        <option value="medium">미드폼 (4~20분)</option>
        <option value="long">롱폼 (20분 이상)</option>
      </select>

      <label>기간</label>
      <select id="period">
        <option value="">전체</option>
        <option value="7">최근 1주</option>
        <option value="30" selected>최근 1개월</option>
        <option value="90">최근 3개월</option>
        <option value="180">최근 6개월</option>
        <option value="365">최근 1년</option>
      </select>

      <label>최소 구독자</label>
      <select id="minSubs">
        <option value="0">제한 없음</option>
        <option value="1000">1,000+</option>
        <option value="5000">5,000+</option>
        <option value="10000" selected>10,000+</option>
        <option value="50000">50,000+</option>
        <option value="100000">100,000+</option>
      </select>

      <label>최대 구독자</label>
      <select id="maxSubs">
        <option value="0">제한 없음</option>
        <option value="10000">~10,000</option>
        <option value="50000">~50,000</option>
        <option value="100000">~100,000</option>
        <option value="500000">~500,000</option>
        <option value="1000000">~1,000,000</option>
      </select>

      <label>결과 수</label>
      <select id="maxResults">
        <option value="25">25개</option>
        <option value="50" selected>50개</option>
      </select>
    </div>
  </div>
</div>

<div class="progress-bar" id="progressBar">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="progress-text" id="progressText"></div>
</div>

<div class="error-msg" id="errorMsg"></div>

<div class="sort-bar" id="sortBar" style="display:none;">
  <div class="result-count" id="resultCount"></div>
  <div class="sort-btns">
    <button class="active" onclick="sortBy('outlier', this)">아웃라이어순</button>
    <button onclick="sortBy('views', this)">조회수순</button>
    <button onclick="sortBy('date', this)">최신순</button>
  </div>
</div>

<div class="results" id="results">
  <div class="empty">검색어를 입력하고 아웃라이어 영상을 찾아보세요</div>
</div>

<script>
const API_BASE = 'https://www.googleapis.com/youtube/v3';
let allResults = [];
let channelCache = {};

// API Key Management
function getKeys() {
  return JSON.parse(localStorage.getItem('yt_api_keys') || '[]');
}

function saveKeys(keys) {
  localStorage.setItem('yt_api_keys', JSON.stringify(keys));
}

function getActiveKeyId() {
  return localStorage.getItem('yt_active_key') || '';
}

function setActiveKeyId(id) {
  localStorage.setItem('yt_active_key', id);
}

function getApiKey() {
  const keys = getKeys();
  const activeId = getActiveKeyId();
  const active = keys.find(k => k.id === activeId);
  return active ? active.key : '';
}

function addApiKey() {
  const nameInput = document.getElementById('keyName');
  const keyInput = document.getElementById('apiKey');
  const name = nameInput.value.trim() || ('Key ' + (getKeys().length + 1));
  const key = keyInput.value.trim();
  if (!key) return;

  const keys = getKeys();
  const id = Date.now().toString();
  keys.push({ id, name, key });
  saveKeys(keys);
  setActiveKeyId(id);

  nameInput.value = '';
  keyInput.value = '';
  renderKeyList();
  showKeyStatus('추가됨');
}

function selectKey(id) {
  setActiveKeyId(id);
  renderKeyList();
}

function deleteKey(id, e) {
  e.stopPropagation();
  let keys = getKeys();
  keys = keys.filter(k => k.id !== id);
  saveKeys(keys);
  if (getActiveKeyId() === id) {
    setActiveKeyId(keys.length > 0 ? keys[0].id : '');
  }
  renderKeyList();
}

function maskKey(key) {
  if (key.length <= 8) return '****';
  return key.slice(0, 4) + '...' + key.slice(-4);
}

function renderKeyList() {
  const keys = getKeys();
  const activeId = getActiveKeyId();
  const container = document.getElementById('keyList');

  if (keys.length === 0) {
    container.innerHTML = '';
    return;
  }

  container.innerHTML = keys.map(k => `
    <div class="key-chip ${k.id === activeId ? 'active' : ''}" onclick="selectKey('${k.id}')">
      <span class="chip-name">${escHtml(k.name)}</span>
      <span class="chip-key">${maskKey(k.key)}</span>
      <span class="chip-delete" onclick="deleteKey('${k.id}', event)">&times;</span>
    </div>
  `).join('');
}

function showKeyStatus(msg) {
  const el = document.getElementById('keyStatus');
  el.textContent = msg;
  setTimeout(() => el.textContent = '', 2000);
}

// Migrate old single key
(function() {
  const oldKey = localStorage.getItem('yt_api_key');
  if (oldKey && getKeys().length === 0) {
    const id = Date.now().toString();
    saveKeys([{ id, name: 'Default', key: oldKey }]);
    setActiveKeyId(id);
    localStorage.removeItem('yt_api_key');
  }
  renderKeyList();
})();

// Fetch helper
async function ytApi(endpoint, params) {
  const key = getApiKey();
  if (!key) throw new Error('API Key를 입력해주세요.');
  const url = new URL(`${API_BASE}/${endpoint}`);
  params.key = key;
  Object.entries(params).forEach(([k, v]) => { if (v !== undefined && v !== '') url.searchParams.set(k, v); });
  const res = await fetch(url);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const msg = err?.error?.message || `API 오류 (${res.status})`;
    throw new Error(msg);
  }
  return res.json();
}

// Progress
function showProgress(pct, text) {
  const bar = document.getElementById('progressBar');
  bar.classList.add('show');
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = text;
}

function hideProgress() {
  document.getElementById('progressBar').classList.remove('show');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}

// Format number
function fmt(n) {
  if (n >= 100000000) return (n / 100000000).toFixed(1) + '억';
  if (n >= 10000) return (n / 10000).toFixed(1) + '만';
  if (n >= 1000) return (n / 1000).toFixed(1) + '천';
  return n.toLocaleString();
}

function fmtDate(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

// Main search
async function doSearch() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;
  if (!getApiKey()) { showError('API Key를 입력해주세요.'); return; }

  hideError();
  allResults = [];
  channelCache = {};
  document.getElementById('results').innerHTML = '';
  document.getElementById('sortBar').style.display = 'none';
  document.getElementById('btnSearch').disabled = true;

  try {
    const maxResults = parseInt(document.getElementById('maxResults').value);
    const period = document.getElementById('period').value;

    let publishedAfter;
    if (period) {
      const d = new Date();
      d.setDate(d.getDate() - parseInt(period));
      publishedAfter = d.toISOString();
    }

    // Step 1: Search
    showProgress(10, '영상 검색 중...');
    let videoIds = [];
    let nextPageToken = '';

    while (videoIds.length < maxResults) {
      const remaining = maxResults - videoIds.length;
      const duration = document.getElementById('duration').value;
      const params = {
        part: 'snippet',
        q: query,
        type: 'video',
        order: 'relevance',
        maxResults: Math.min(remaining, 50),
        publishedAfter: publishedAfter,
        videoDuration: duration || undefined,
        pageToken: nextPageToken || undefined
      };
      const searchData = await ytApi('search', params);
      const ids = searchData.items.map(i => i.id.videoId).filter(Boolean);
      videoIds.push(...ids);
      nextPageToken = searchData.nextPageToken;
      if (!nextPageToken) break;
    }

    videoIds = videoIds.slice(0, maxResults);

    if (videoIds.length === 0) {
      document.getElementById('results').innerHTML = '<div class="empty">검색 결과가 없습니다.</div>';
      hideProgress();
      document.getElementById('btnSearch').disabled = false;
      return;
    }

    // Step 2: Get video details (batch 50)
    showProgress(30, '영상 정보 조회 중...');
    let videos = [];
    for (let i = 0; i < videoIds.length; i += 50) {
      const batch = videoIds.slice(i, i + 50);
      const data = await ytApi('videos', {
        part: 'snippet,statistics',
        id: batch.join(',')
      });
      videos.push(...data.items);
    }

    // Step 3: Get channel details
    const channelIds = [...new Set(videos.map(v => v.snippet.channelId))];
    showProgress(50, `채널 정보 조회 중 (${channelIds.length}개)...`);

    for (let i = 0; i < channelIds.length; i += 50) {
      const batch = channelIds.slice(i, i + 50);
      const data = await ytApi('channels', {
        part: 'statistics',
        id: batch.join(',')
      });
      data.items.forEach(ch => {
        channelCache[ch.id] = {
          subscribers: parseInt(ch.statistics.subscriberCount) || 0,
          totalViews: parseInt(ch.statistics.viewCount) || 0,
          videoCount: parseInt(ch.statistics.videoCount) || 1
        };
      });
      showProgress(50 + (i / channelIds.length) * 40, `채널 정보 조회 중...`);
    }

    // Step 4: Calculate outlier scores
    showProgress(90, '아웃라이어 점수 계산 중...');
    const minSubs = parseInt(document.getElementById('minSubs').value);
    const maxSubs = parseInt(document.getElementById('maxSubs').value);

    allResults = videos.map(v => {
      const ch = channelCache[v.snippet.channelId] || { subscribers: 0, totalViews: 0, videoCount: 1 };
      const views = parseInt(v.statistics.viewCount) || 0;
      const channelAvg = ch.videoCount > 0 ? ch.totalViews / ch.videoCount : 1;
      const outlierScore = channelAvg > 0 ? views / channelAvg : 0;

      return {
        videoId: v.id,
        title: v.snippet.title,
        channelTitle: v.snippet.channelTitle,
        channelId: v.snippet.channelId,
        thumbnail: v.snippet.thumbnails.high?.url || v.snippet.thumbnails.medium?.url || v.snippet.thumbnails.default?.url,
        publishedAt: v.snippet.publishedAt,
        views,
        likes: parseInt(v.statistics.likeCount) || 0,
        comments: parseInt(v.statistics.commentCount) || 0,
        subscribers: ch.subscribers,
        channelAvg: Math.round(channelAvg),
        outlierScore: Math.round(outlierScore * 100) / 100
      };
    }).filter(v => {
      if (minSubs > 0 && v.subscribers < minSubs) return false;
      if (maxSubs > 0 && v.subscribers > maxSubs) return false;
      return true;
    });

    // Sort by outlier score
    allResults.sort((a, b) => b.outlierScore - a.outlierScore);

    showProgress(100, '완료!');
    setTimeout(hideProgress, 500);
    renderResults();

  } catch (e) {
    hideProgress();
    showError(e.message);
  }

  document.getElementById('btnSearch').disabled = false;
}

function sortBy(type, btn) {
  document.querySelectorAll('.sort-btns button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (type === 'outlier') allResults.sort((a, b) => b.outlierScore - a.outlierScore);
  else if (type === 'views') allResults.sort((a, b) => b.views - a.views);
  else if (type === 'date') allResults.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));

  renderResults();
}

function renderResults() {
  const container = document.getElementById('results');
  document.getElementById('sortBar').style.display = 'flex';
  document.getElementById('resultCount').textContent = `${allResults.length}개 영상`;

  if (allResults.length === 0) {
    container.innerHTML = '<div class="empty">필터 조건에 맞는 영상이 없습니다.</div>';
    return;
  }

  container.innerHTML = allResults.map(v => {
    const badgeClass = v.outlierScore >= 5 ? 'hot' : v.outlierScore >= 2 ? 'warm' : 'normal';
    const scoreText = v.outlierScore >= 100 ? fmt(Math.round(v.outlierScore)) + 'x' : v.outlierScore.toFixed(1) + 'x';

    return `
      <div class="card">
        <div class="card-thumb" onclick="window.open('https://www.youtube.com/watch?v=${v.videoId}','_blank')">
          <img src="${v.thumbnail}" alt="" loading="lazy">
          <div class="outlier-badge ${badgeClass}">${scoreText}</div>
        </div>
        <div class="card-body">
          <div class="card-title">
            <a href="https://www.youtube.com/watch?v=${v.videoId}" target="_blank">${escHtml(v.title)}</a>
          </div>
          <div class="card-channel">${escHtml(v.channelTitle)} · 구독자 ${fmt(v.subscribers)}</div>
          <div class="card-stats">
            <div class="stat">
              <div class="stat-label">조회수</div>
              <div class="stat-value">${fmt(v.views)}</div>
            </div>
            <div class="stat">
              <div class="stat-label">채널 평균</div>
              <div class="stat-value">${fmt(v.channelAvg)}</div>
            </div>
            <div class="stat">
              <div class="stat-label">아웃라이어</div>
              <div class="stat-value highlight">${scoreText}</div>
            </div>
            <div class="stat">
              <div class="stat-label">업로드</div>
              <div class="stat-value">${fmtDate(v.publishedAt)}</div>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>

</html>
